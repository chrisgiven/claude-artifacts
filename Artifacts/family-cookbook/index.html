<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Recipe Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #ffffff;
    --ink: #1a1410;
    --brown: #5c3d2e;
    --terracotta: #c4602a;
    --gold: #c9963a;
    --sage: #7a9e7e;
    --light-sage: #eef3ef;
    --border: #e8e0d4;
    --muted: #8c7b6e;
    --card-shadow: 0 2px 20px rgba(26,20,16,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--brown);
    color: var(--cream);
    text-align: center;
    padding: 3rem 1.5rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .site-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.02) 40px,
      rgba(255,255,255,0.02) 80px
    );
  }
  .header-subtitle {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }
  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 600;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 0.5rem;
  }
  .header-desc {
    font-size: 0.9rem;
    color: rgba(250,247,242,0.6);
    font-weight: 300;
    letter-spacing: 0.05em;
  }

  /* CONTROLS */
  .controls {
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 16px; height: 16px;
  }
  .search-input {
    width: 100%;
    padding: 0.6rem 0.75rem 0.6rem 2.25rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Lato', sans-serif;
    font-size: 0.9rem;
    background: var(--cream);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--terracotta); }
  .filter-tags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .tag {
    padding: 0.35rem 0.85rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'Lato', sans-serif;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 0.03em;
  }
  .tag:hover { border-color: var(--terracotta); color: var(--terracotta); }
  .tag.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

  /* GRID */
  .main { padding: 2rem 1.5rem; max-width: 1200px; margin: 0 auto; }
  .recipe-count {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* CARD */
  .card {
    background: var(--warm-white);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 32px rgba(26,20,16,0.13);
  }
  .card-img-wrap {
    height: 200px;
    overflow: hidden;
    background: var(--cream);
    position: relative;
  }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.4s;
    display: block;
  }
  .card:hover .card-img { transform: scale(1.04); }
  .card-emoji-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 64px;
    background: var(--light-sage);
  }
  .card-category {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--brown);
    color: var(--cream);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
  }
  .card-body {
    padding: 1.1rem 1.25rem 1.25rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
  }
  .card-desc {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.55;
    flex: 1;
  }
  .card-footer {
    display: flex;
    gap: 10px;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
  }
  .card-footer span { display: flex; align-items: center; gap: 4px; }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .no-results .big { font-size: 3rem; margin-bottom: 0.75rem; }
  .no-results p { font-family: 'Playfair Display', serif; font-size: 1.1rem; }

  /* DETAIL VIEW */
  .detail-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,20,16,0.55);
    z-index: 100;
    overflow-y: auto;
    padding: 1.5rem;
  }
  .detail-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .detail-panel {
    background: var(--warm-white);
    border-radius: 12px;
    width: 100%;
    max-width: 720px;
    overflow: hidden;
    position: relative;
    margin: auto;
  }
  .detail-hero-wrap {
    height: 320px;
    overflow: hidden;
    position: relative;
    background: var(--cream);
  }
  .detail-hero {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .detail-hero-emoji {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 96px;
    background: var(--light-sage);
  }
  .detail-hero-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(26,20,16,0.75));
    padding: 2rem 1.75rem 1.25rem;
  }
  .detail-category-badge {
    display: inline-block;
    background: var(--terracotta);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 3px;
    margin-bottom: 0.5rem;
  }
  .detail-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: white;
    font-weight: 600;
    line-height: 1.2;
  }
  .close-btn {
    position: absolute;
    top: 1rem; right: 1rem;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(26,20,16,0.5);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: background 0.2s;
  }
  .close-btn:hover { background: rgba(26,20,16,0.8); }
  .detail-content {
    padding: 1.5rem 1.75rem 2rem;
  }
  .detail-desc {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 1.25rem;
    font-style: italic;
  }

  /* Servings scaler */
  .servings-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .servings-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 700;
    flex: 1;
  }
  .svc-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 16px;
    color: var(--brown);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .svc-btn:hover { background: var(--terracotta); color: white; border-color: var(--terracotta); }
  .svc-val {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--brown);
    min-width: 36px;
    text-align: center;
  }
  .svc-unit { font-size: 0.82rem; color: var(--muted); }

  /* Two-column layout */
  .detail-cols {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 2rem;
  }
  @media (max-width: 580px) {
    .detail-cols { grid-template-columns: 1fr; }
  }

  .section-heading {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 0.75rem;
    padding-bottom: 0.4rem;
    border-bottom: 1px solid var(--border);
  }

  /* Ingredients */
  .ing-list { list-style: none; }
  .ing-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    padding: 6px 0;
    border-bottom: 1px dotted var(--border);
    font-size: 0.85rem;
  }
  .ing-item:last-child { border-bottom: none; }
  .ing-name { color: var(--ink); flex: 1; }
  .ing-amt {
    color: var(--brown);
    font-weight: 700;
    font-size: 0.8rem;
    white-space: nowrap;
  }

  /* Steps */
  .steps-list { list-style: none; counter-reset: steps; }
  .step {
    counter-increment: steps;
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .step:last-child { border-bottom: none; }
  .step-num {
    min-width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--brown);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .step-content { flex: 1; }
  .step-title {
    font-weight: 700;
    font-size: 0.85rem;
    color: var(--brown);
    margin-bottom: 3px;
  }
  .step-desc {
    font-size: 0.84rem;
    color: var(--ink);
    line-height: 1.6;
  }

  /* Notes */
  .notes-box {
    margin-top: 1.5rem;
    background: #fef9f1;
    border-left: 3px solid var(--gold);
    border-radius: 0 6px 6px 0;
    padding: 0.85rem 1rem;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.65;
  }
  .notes-box strong { color: var(--brown); display: block; margin-bottom: 3px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }

  /* Footer */
  .site-footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  .site-footer span { font-family: 'Playfair Display', serif; font-style: italic; }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-subtitle">A family treasure</div>
  <h1 class="header-title">The Family Cookbook</h1>
  <p class="header-desc">15 cherished recipes, passed down with love</p>
</header>

<div class="controls">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="search" placeholder="Search recipes…" oninput="filterRecipes()">
  </div>
  <div class="filter-tags" id="tags"></div>
</div>

<main class="main">
  <div class="recipe-count" id="count"></div>
  <div class="grid" id="grid"></div>
</main>

<footer class="site-footer">
  Made with love &nbsp;·&nbsp; <span>The Family Cookbook</span>
</footer>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay" onclick="handleOverlayClick(event)">
  <div class="detail-panel" id="detail-panel">
    <button class="close-btn" onclick="closeDetail()">✕</button>
    <div id="detail-body"></div>
  </div>
</div>

const categories = ["All", ...new Set(recipes.map(r => r.category))];
let activeCategory = "All";
let currentServings = {};
recipes.forEach(r => currentServings[r.id] = r.servings);

function renderTags() {
  document.getElementById("tags").innerHTML = categories.map(c =>
    `<button class="tag ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
  ).join("");
}

function setCategory(cat) {
  activeCategory = cat;
  renderTags();
  filterRecipes();
}

function filterRecipes() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = recipes.filter(r => {
    const mc = activeCategory === "All" || r.category === activeCategory;
    const mq = !q || r.title.toLowerCase().includes(q) || r.category.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q);
    return mc && mq;
  });
  renderGrid(filtered);
}

function renderGrid(list) {
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");
  count.textContent = `${list.length} recipe${list.length !== 1 ? 's' : ''}`;
  if (!list.length) {
    grid.innerHTML = `<div class="no-results"><div class="big">🍽️</div><p>No recipes found — try a different search.</p></div>`;
    return;
  }
  grid.innerHTML = list.map(r => `
    <article class="card" onclick="openDetail(${r.id})">
      <div class="card-img-wrap">
        <img class="card-img" src="${imgMap[r.img]||r.img}" alt="${r.title}"
          onerror="this.parentElement.innerHTML='<div class=\\'card-emoji-fallback\\'>${r.emoji}</div>'"
          loading="lazy">
        <div class="card-category">${r.category}</div>
      </div>
      <div class="card-body">
        <h2 class="card-title">${r.title}</h2>
        <p class="card-desc">${r.desc}</p>
        <div class="card-footer">
          <span>🥄 ${r.ingredients.length} ingredients</span>
          <span>📋 ${r.steps.length} steps</span>
          <span>🍽 ${r.servings} ${r.servingLabel}</span>
        </div>
      </div>
    </article>
  `).join("");
}

function scaleAmt(amt, mult) {
  if (mult === 1) return amt;
  const frac = {"¼":0.25,"½":0.5,"¾":0.75,"⅓":0.333,"⅔":0.667};
  const match = amt.match(/^([¼½¾⅓⅔]|\d+\.?\d*)/);
  if (!match) return amt;
  let num = parseFloat(frac[match[1]] !== undefined ? frac[match[1]] : match[1]);
  num = Math.round(num * mult * 100) / 100;
  return num + amt.slice(match[1].length);
}

function renderIngredients(r, mult) {
  return r.ingredients.map(ing =>
    `<li class="ing-item"><span class="ing-name">${ing.name}</span><span class="ing-amt">${scaleAmt(ing.amt, mult)}</span></li>`
  ).join("");
}

function changeServings(id, delta) {
  const r = recipes.find(x => x.id === id);
  const step = Math.max(1, Math.floor(r.servings / 12));
  currentServings[id] = Math.max(1, currentServings[id] + delta * step);
  document.getElementById("sv-" + id).textContent = currentServings[id];
  document.getElementById("ing-" + id).innerHTML = renderIngredients(r, currentServings[id] / r.servings);
}

function openDetail(id) {
  const r = recipes.find(x => x.id === id);
  const mult = currentServings[id] / r.servings;
  document.getElementById("detail-body").innerHTML = `
    <div class="detail-hero-wrap">
      <img class="detail-hero" src="${imgMap[r.img]||r.img}" alt="${r.title}"
        onerror="this.parentElement.innerHTML='<div class=\\'detail-hero-emoji\\'>${r.emoji}</div>'">
      <div class="detail-hero-overlay">
        <div class="detail-category-badge">${r.category}</div>
        <h2 class="detail-title">${r.title}</h2>
      </div>
    </div>
    <div class="detail-content">
      <p class="detail-desc">${r.desc}</p>
      <div class="servings-bar">
        <span class="servings-label">Servings</span>
        <button class="svc-btn" onclick="changeServings(${id},-1)">−</button>
        <span class="svc-val" id="sv-${id}">${currentServings[id]}</span>
        <button class="svc-btn" onclick="changeServings(${id},1)">+</button>
        <span class="svc-unit">${r.servingLabel}</span>
      </div>
      <div class="detail-cols">
        <div>
          <div class="section-heading">Ingredients</div>
          <ul class="ing-list" id="ing-${id}">${renderIngredients(r, mult)}</ul>
        </div>
        <div>
          <div class="section-heading">Method</div>
          <ol class="steps-list">
            ${r.steps.map(s => `
              <li class="step">
                <div class="step-num"></div>
                <div class="step-content">
                  <div class="step-title">${s.title}</div>
                  <div class="step-desc">${s.desc}</div>
                </div>
              </li>`).join("")}
          </ol>
        </div>
      </div>
      ${r.notes ? `<div class="notes-box"><strong>Notes</strong>${r.notes}</div>` : ""}
    </div>
  `;
  document.getElementById("detail-overlay").classList.add("open");
  document.getElementById("detail-overlay").scrollTop = 0;
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById("detail-overlay")) closeDetail();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

renderTags();
filterRecipes();
</script>
